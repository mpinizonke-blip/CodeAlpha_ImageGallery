<!DOCTYPE html>
<html lang="en">
    <head>  
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CodeAlpha Gallery Image</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1>CodeAlpha Gallery Image</h1>

            <div class="gallery">
                <img src="https://picsum.photos/600/400?random=1" alt="Nature 1">
                <img src="https://picsum.photos/600/400?random=2" alt="Nature 2">
                <img src="https://picsum.photos/600/400?random=3" alt="Nature 3">
                <img src="https://picsum.photos/600/400?random=4" alt="Nature 4">
                <img src="https://picsum.photos/600/400?random=5" alt="Nature 5">
                <img src="https://picsum.photos/600/400?random=6" alt="Nature 6">
                <img src="https://picsum.photos/600/400?random=7" alt="Nature 7">
                <img src="https://picsum.photos/600/400?random=8" alt="Nature 8">
                <p>Gallery Image Done by Mpini Zonke</p>
            </div>
        </div>
        
        <!---Lightbox--->
        <div id="lightbox" class="lightbox">
            <span class="close">&times;</span>
            <img class="lightbox-img" src="" alt="">
            <a class="prev">&#10094;</a>
            <a class="next">&#10095;</a>
            <a class="caption">Caption</a>
        </div>

        <script src="script.js"></script>
    </body>
</html>
